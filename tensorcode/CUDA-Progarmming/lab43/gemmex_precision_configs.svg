  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Times New Roman&quot;,-apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Three configurations shown as rows. FP32 all the way through for baseline. FP16 inputs and output with FP32 accumulation for training. INT8 inputs with INT32 accumulation for inference. Each row shows speed, memory, and accuracy tradeoff.</desc>
