lack" rx="2"/><rect x="457.4473571777344" y="224.51927185058594" width="57.1052360534668" height="18.961447715759277" fill="black" rx="2"/><rect x="130" y="262.519287109375" width="86.49565124511719" height="18.961447715759277" fill="black" rx="2"/><rect x="254" y="262.519287109375" width="82.80110168457031" height="18.961447715759277" fill="black" rx="2"/><rect x="378" y="262.519287109375" width="194.32977294921875" height="18.961447715759277" fill="black" rx="2"/><rect x="596" y="282.5192565917969" width="33.42926597595215" height="18.961447715759277" fill="black" rx="2"/></mask></defs>

