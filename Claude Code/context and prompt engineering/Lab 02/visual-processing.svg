<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1380" font-family="system-ui, sans-serif">

  <!-- Background -->
  <rect width="900" height="1380" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <rect x="20" y="16" width="860" height="52" rx="8" fill="#1e3a5f"/>
  <text x="450" y="48" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">How Claude Processes a Screenshot — Visual Prompting Pipeline</text>

  <!-- ── STEP 0: User Input ── -->
  <rect x="250" y="88" width="400" height="44" rx="22" fill="#1e3a5f"/>
  <text x="450" y="115" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">User attaches screenshot to Claude Code prompt</text>

  <!-- Arrow -->
  <line x1="450" y1="132" x2="450" y2="152" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── STEP 1: Format Check ── -->
  <rect x="40" y="152" width="820" height="110" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="60" y="175" font-size="12" font-weight="700" fill="#1e3a5f">Step 1 — Format Check</text>

  <!-- OK -->
  <rect x="60" y="185" width="230" height="60" rx="6" fill="#ffffff" stroke="#16a34a" stroke-width="1.5"/>
  <text x="75" y="206" font-size="11" font-weight="600" fill="#16a34a">Supported formats</text>
  <text x="75" y="222" font-size="11" fill="#374151">PNG, JPEG, WebP</text>
  <text x="75" y="237" font-size="10" fill="#6b7280">Full quality — use PNG for text-heavy UI</text>

  <!-- GIF warning -->
  <rect x="310" y="185" width="230" height="60" rx="6" fill="#ffffff" stroke="#d97706" stroke-width="1.5"/>
  <text x="325" y="206" font-size="11" font-weight="600" fill="#d97706">GIF — partial support</text>
  <text x="325" y="222" font-size="11" fill="#374151">First frame only</text>
  <text x="325" y="237" font-size="10" fill="#6b7280">Animation is dropped entirely</text>

  <!-- Rejected -->
  <rect x="560" y="185" width="230" height="60" rx="6" fill="#ffffff" stroke="#dc2626" stroke-width="1.5"/>
  <text x="575" y="206" font-size="11" font-weight="600" fill="#dc2626">Over 5 MB — rejected</text>
  <text x="575" y="222" font-size="11" fill="#374151">API hard limit</text>
  <text x="575" y="237" font-size="10" fill="#6b7280">Crop or compress before attaching</text>

  <!-- Arrow -->
  <line x1="450" y1="262" x2="450" y2="282" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── STEP 2: Resolution Gate ── -->
  <rect x="40" y="282" width="820" height="170" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="60" y="305" font-size="12" font-weight="700" fill="#713f12">Step 2 — Resolution Gate</text>

  <!-- Decision diamond -->
  <polygon points="450,320 530,355 450,390 370,355" fill="#ffffff" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="450" y="350" text-anchor="middle" font-size="11" font-weight="600" fill="#713f12">Long edge</text>
  <text x="450" y="365" text-anchor="middle" font-size="11" font-weight="600" fill="#713f12">&gt; 1568px?</text>

  <!-- Yes path -->
  <line x1="370" y1="355" x2="200" y2="355" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="285" y="348" text-anchor="middle" font-size="10" fill="#dc2626">Yes — e.g. 1920x1080</text>
  <rect x="60" y="375" width="270" height="60" rx="6" fill="#ffffff" stroke="#dc2626" stroke-width="1.5"/>
  <text x="195" y="397" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">Downscale proportionally</text>
  <text x="195" y="412" text-anchor="middle" font-size="11" fill="#374151">Resized to fit 1568px cap</text>
  <text x="195" y="427" text-anchor="middle" font-size="10" fill="#6b7280">Pixels beyond cap are discarded</text>

  <!-- No path -->
  <line x1="530" y1="355" x2="660" y2="355" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="595" y="348" text-anchor="middle" font-size="10" fill="#16a34a">No — e.g. 600x200 crop</text>
  <rect x="570" y="375" width="270" height="60" rx="6" fill="#ffffff" stroke="#16a34a" stroke-width="1.5"/>
  <text x="705" y="397" text-anchor="middle" font-size="11" font-weight="600" fill="#16a34a">Full fidelity kept</text>
  <text x="705" y="412" text-anchor="middle" font-size="11" fill="#374151">No downscaling applied</text>
  <text x="705" y="427" text-anchor="middle" font-size="10" fill="#6b7280">Every pixel Claude sees is relevant</text>

  <!-- Callout: crop insight -->
  <rect x="60" y="442" width="780" height="26" rx="5" fill="#fef08a" stroke="#ca8a04" stroke-width="1"/>
  <text x="450" y="459" text-anchor="middle" font-size="10" fill="#713f12">Crop insight: a 600x200 crop costs ~160 tokens vs ~1845 tokens for a downscaled 1920x1080 — same cap, but the crop gives Claude only what matters</text>

  <!-- Arrow -->
  <line x1="450" y1="468" x2="450" y2="488" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── STEP 3: Tokenization ── -->
  <rect x="40" y="488" width="820" height="100" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="60" y="511" font-size="12" font-weight="700" fill="#3b0764">Step 3 — Tokenization</text>

  <rect x="60" y="520" width="360" height="52" rx="6" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="240" y="541" text-anchor="middle" font-size="12" font-weight="700" fill="#7c3aed">Token cost = width x height / 750</text>
  <text x="240" y="558" text-anchor="middle" font-size="10" fill="#6b7280">Calculated on final (post-downscale) dimensions</text>

  <rect x="440" y="520" width="400" height="52" rx="6" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="640" y="541" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Tokens locked into context for the entire session</text>
  <text x="640" y="558" text-anchor="middle" font-size="10" fill="#6b7280">10 full-screen images = ~18,450 tokens consumed</text>

  <!-- Arrow -->
  <line x1="450" y1="588" x2="450" y2="608" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── STEP 4: Prompt Assembly ── -->
  <rect x="40" y="608" width="820" height="120" rx="8" fill="#fce7f3" stroke="#db2777" stroke-width="1.5"/>
  <text x="60" y="631" font-size="12" font-weight="700" fill="#831843">Step 4 — Prompt Assembly (Order Matters)</text>

  <rect x="60" y="642" width="360" height="70" rx="6" fill="#ffffff" stroke="#16a34a" stroke-width="1.5"/>
  <text x="240" y="663" text-anchor="middle" font-size="11" font-weight="700" fill="#16a34a">Correct order</text>
  <text x="240" y="679" text-anchor="middle" font-size="11" fill="#374151">Image first, then your question</text>
  <text x="240" y="695" text-anchor="middle" font-size="10" fill="#6b7280">Claude reads visual context before the question</text>
  <text x="240" y="708" text-anchor="middle" font-size="10" fill="#6b7280">Multiple images: label each — Image 1 ... Image 2 ...</text>

  <rect x="440" y="642" width="400" height="70" rx="6" fill="#ffffff" stroke="#dc2626" stroke-width="1.5"/>
  <text x="640" y="663" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">Wrong order</text>
  <text x="640" y="679" text-anchor="middle" font-size="11" fill="#374151">Question first, then image</text>
  <text x="640" y="695" text-anchor="middle" font-size="10" fill="#6b7280">Suboptimal — question has no visual context yet</text>
  <text x="640" y="708" text-anchor="middle" font-size="10" fill="#6b7280">Unlabeled multiple images may be conflated</text>

  <!-- Arrow -->
  <line x1="450" y1="728" x2="450" y2="748" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── STEP 5: Visual Processing ── -->
  <rect x="40" y="748" width="820" height="100" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
  <text x="60" y="771" font-size="12" font-weight="700" fill="#0c4a6e">Step 5 — Visual Processing</text>

  <rect x="60" y="782" width="230" height="50" rx="6" fill="#ffffff" stroke="#0284c7" stroke-width="1.5"/>
  <text x="175" y="803" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Image converted</text>
  <text x="175" y="820" text-anchor="middle" font-size="10" fill="#6b7280">to vision tokens</text>

  <line x1="290" y1="807" x2="340" y2="807" stroke="#0284c7" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <rect x="340" y="782" width="230" height="50" rx="6" fill="#ffffff" stroke="#0284c7" stroke-width="1.5"/>
  <text x="455" y="803" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Merged with text tokens</text>
  <text x="455" y="820" text-anchor="middle" font-size="10" fill="#6b7280">in context window</text>

  <line x1="570" y1="807" x2="620" y2="807" stroke="#0284c7" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <rect x="620" y="782" width="220" height="50" rx="6" fill="#ffffff" stroke="#0284c7" stroke-width="1.5"/>
  <text x="730" y="803" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Claude reasons across</text>
  <text x="730" y="820" text-anchor="middle" font-size="10" fill="#6b7280">both modalities together</text>

  <!-- Arrow -->
  <line x1="450" y1="848" x2="450" y2="868" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── STEP 6: Can / Cannot ── -->
  <rect x="40" y="868" width="820" height="160" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="60" y="891" font-size="12" font-weight="700" fill="#14532d">Step 6 — What Claude Can and Cannot Read</text>

  <!-- Can -->
  <rect x="60" y="902" width="370" height="110" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="245" y="922" text-anchor="middle" font-size="11" font-weight="700" fill="#16a34a">Can Read</text>
  <text x="80" y="940" font-size="11" fill="#374151">• Layout structure and visual hierarchy</text>
  <text x="80" y="957" font-size="11" fill="#374151">• Approximate colors (not exact hex values)</text>
  <text x="80" y="974" font-size="11" fill="#374151">• Text content — best in PNG, not JPEG</text>
  <text x="80" y="991" font-size="11" fill="#374151">• Spatial relationships (estimates, not exact px)</text>

  <!-- Cannot -->
  <rect x="450" y="902" width="390" height="110" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="645" y="922" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">Cannot Read</text>
  <text x="470" y="940" font-size="11" fill="#374151">• Image metadata — EXIF, filename, timestamp</text>
  <text x="470" y="957" font-size="11" fill="#374151">• Animation frames beyond frame 1</text>
  <text x="470" y="974" font-size="11" fill="#374151">• Exact pixel measurements</text>
  <text x="470" y="991" font-size="11" fill="#374151">• Small text in high-compression JPEG</text>

  <!-- Arrow -->
  <line x1="450" y1="1028" x2="450" y2="1048" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── STEP 7: Response Quality ── -->
  <rect x="40" y="1048" width="820" height="130" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="60" y="1071" font-size="12" font-weight="700" fill="#7c2d12">Step 7 — Response Quality Depends on Your Question</text>

  <rect x="60" y="1082" width="360" height="80" rx="6" fill="#ffffff" stroke="#dc2626" stroke-width="1.5"/>
  <text x="240" y="1103" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">Vague question</text>
  <text x="240" y="1120" text-anchor="middle" font-size="11" fill="#374151">"What do you think?"</text>
  <text x="240" y="1137" text-anchor="middle" font-size="10" fill="#6b7280">Result: generic commentary, no deliverable</text>
  <text x="240" y="1153" text-anchor="middle" font-size="10" fill="#6b7280">Claude decides what to analyze</text>

  <rect x="440" y="1082" width="400" height="80" rx="6" fill="#ffffff" stroke="#16a34a" stroke-width="1.5"/>
  <text x="640" y="1103" text-anchor="middle" font-size="11" font-weight="700" fill="#16a34a">Specific question</text>
  <text x="640" y="1120" text-anchor="middle" font-size="11" fill="#374151">Element + Constraint + Output format + Intent</text>
  <text x="640" y="1137" text-anchor="middle" font-size="10" fill="#6b7280">Result: targeted, actionable output</text>
  <text x="640" y="1153" text-anchor="middle" font-size="10" fill="#6b7280">Claude applies a defined standard to what it sees</text>

  <!-- Arrow -->
  <line x1="450" y1="1178" x2="450" y2="1198" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── Output ── -->
  <rect x="220" y="1198" width="460" height="44" rx="22" fill="#064e3b"/>
  <text x="450" y="1225" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Claude response — grounded in visual state</text>

  <!-- ── Key Principles strip ── -->
  <rect x="40" y="1258" width="820" height="102" rx="8" fill="#1e3a5f"/>
  <text x="450" y="1278" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">Key Principles for Beginners</text>
  <text x="60" y="1298" font-size="11" fill="#93c5fd">1. Crop before you send — a focused crop beats a downscaled full screen every time</text>
  <text x="60" y="1316" font-size="11" fill="#93c5fd">2. Image before text — Claude reads visual context first, then your question</text>
  <text x="60" y="1334" font-size="11" fill="#93c5fd">3. Specificity wins — the question determines response quality, not just the image</text>
  <text x="60" y="1352" font-size="11" fill="#93c5fd">4. Two screenshots beat one description — before + after closes the verification loop</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#dc2626"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0284c7"/>
    </marker>
  </defs>

</svg>
