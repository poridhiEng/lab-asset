<svg width="620" height="370" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="620" height="370" fill="#f9fafb" rx="12"/>

  <!-- Title -->
  <text x="310" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#111827">BLAS Level Hierarchy</text>

  <!-- ── Level 3 (top, smallest) ── -->
  <polygon points="235,58 385,58 430,138 190,138" fill="#6b7280" stroke="#374151" stroke-width="1.5"/>
  <!-- Level label -->
  <text x="310" y="92" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">Level 3</text>
  <!-- Operation type -->
  <text x="310" y="112" text-anchor="middle" font-size="12" fill="#e5e7eb">Matrix  ×  Matrix</text>
  <!-- Example tag right side -->
  <text x="440" y="105" font-size="11" fill="#9ca3af">GEMM · TRSM · SYRK</text>
  <!-- Complexity -->
  <text x="440" y="120" font-size="10" fill="#9ca3af">O(n³) flops</text>

  <!-- ── Level 2 (middle) ── -->
  <polygon points="190,146 430,146 478,228 142,228" fill="#3b82f6" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="310" y="181" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">Level 2</text>
  <text x="310" y="202" text-anchor="middle" font-size="12" fill="#dbeafe">Matrix  ×  Vector</text>
  <text x="488" y="192" font-size="11" fill="#60a5fa">GEMV · SYMV · TRMV</text>
  <text x="488" y="207" font-size="10" fill="#60a5fa">O(n²) flops</text>

  <!-- ── Level 1 (bottom, highlighted) ── -->
  <polygon points="142,236 478,236 536,324 84,324" fill="#f97316" stroke="#c2410c" stroke-width="2"/>

  <!-- Star badge -->
  <circle cx="110" cy="278" r="18" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="110" y="283" text-anchor="middle" font-size="14" fill="#92400e">★</text>

  <text x="315" y="268" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">Level 1  —  This Lab</text>
  <text x="315" y="290" text-anchor="middle" font-size="12" fill="#fed7aa">Vector  ×  Vector</text>
  <text x="315" y="312" text-anchor="middle" font-size="11" fill="#ffedd5">scal · axpy · dot · nrm2 · copy · swap · asum · rot</text>
  <text x="548" y="283" font-size="11" fill="#fdba74">AXPY · DOT · NRM2</text>
  <text x="548" y="298" font-size="10" fill="#fdba74">O(n) flops</text>

  <!-- ── Left axis label ── -->
  <line x1="62" y1="68" x2="62" y2="316" stroke="#d1d5db" stroke-width="1.5" marker-end="url(#grayArrow)"/>
  <text x="38" y="200" text-anchor="middle" font-size="11" fill="#9ca3af"
        transform="rotate(-90, 38, 200)">Arithmetic Intensity</text>

  <!-- ── Arrow marker ── -->
  <defs>
    <marker id="grayArrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,1 L7,4 L0,7 Z" fill="#d1d5db"/>
    </marker>
  </defs>

</svg>
