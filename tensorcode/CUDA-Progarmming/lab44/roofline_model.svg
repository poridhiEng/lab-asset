<svg width="100%" viewBox="0 0 690 320" role="img" style="" xmlns="http://www.w3.org/2000/svg">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Roofline model showing compute-bound versus memory-bound regions</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">A chart with arithmetic intensity on the x-axis and GFLOPS on the y-axis. A diagonal line shows the memory bandwidth limit. A flat horizontal line shows the peak compute limit. Small matrices fall in the memory-bound region left of the ridge point. Large matrices fall in the compute-bound region right of the ridge point.</desc>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker><mask id="imagine-text-gaps-t54fw9" maskUnits="userSpaceOnUse"><rect x="0" y="0" width="690" height="320" fill="white"/><rect x="163.4805145263672" y="10.701298713684082" width="353.1654968261719" height="21.454545974731445" fill="black" rx="2"/><rect x="176.467529296875" y="256.3636474609375" width="327.20257568359375" height="18.96103858947754" fill="black" rx="2"/><rect x="22.376623153686523" y="226.36363220214844" width="15.246753215789795" height="18.96103858947754" fill="black" rx="2"/><rect x="-7.49350643157959" y="126.36363220214844" width="54.98701477050781" height="18.96103858947754" fill="black" rx="2"/><rect x="595.239990234375" y="50.3636360168457" width="88.64935302734375" height="18.96103858947754" fill="black" rx="2"/><rect x="344" y="40.3636360168457" width="68.81818008422852" height="18.96103858947754" fill="black" rx="2"/><rect x="122.7597427368164" y="166.36363220214844" width="54.48051834106445" height="18.96103858947754" fill="black" rx="2"/><rect x="127.95454406738281" y="180.36363220214844" width="44.09090805053711" height="18.96103858947754" fill="black" rx="2"/><rect x="460.7987060546875" y="136.36363220214844" width="58.40259552001953" height="18.96103858947754" fill="black" rx="2"/><rect x="467.9545593261719" y="150.36363220214844" width="44.09090805053711" height="18.96103858947754" fill="black" rx="2"/><rect x="101.5064926147461" y="200.36363220214844" width="37.12316131591797" height="18.96103858947754" fill="black" rx="2"/><rect x="168.32467651367188" y="175.36363220214844" width="43.350650787353516" height="18.96103858947754" fill="black" rx="2"/><rect x="239.6558380126953" y="135.36363220214844" width="40.68831253051758" height="18.96103858947754" fill="black" rx="2"/><rect x="315.7402648925781" y="96.36363983154297" width="48.65454864501953" height="18.96103858947754" fill="black" rx="2"/><rect x="434.4545593261719" y="74.36363983154297" width="51.09090805053711" height="18.96103858947754" fill="black" rx="2"/><rect x="534.6298828125" y="68.36363983154297" width="50.74026107788086" height="18.96103858947754" fill="black" rx="2"/><rect x="134.30519104003906" y="284.3636474609375" width="411.3896179199219" height="18.96103858947754" fill="black" rx="2"/></mask></defs>

  <text x="340" y="26" text-anchor="middle" style="fill:rgb(250, 249, 245);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:14px;font-weight:500;text-anchor:middle;dominant-baseline:auto">roofline model — GEMM performance vs matrix size</text>

  <!-- Axes -->
  <line x1="80" y1="40" x2="80" y2="240" stroke="var(--color-text-secondary)" stroke-width="1" style="fill:rgb(0, 0, 0);stroke:rgb(194, 192, 182);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="80" y1="240" x2="620" y2="240" stroke="var(--color-text-secondary)" stroke-width="1" style="fill:rgb(0, 0, 0);stroke:rgb(194, 192, 182);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Axis labels -->
  <text x="340" y="270" text-anchor="middle" style="fill:rgb(194, 192, 182);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:auto">arithmetic intensity (FLOPs / byte) → matrix size grows →</text>
  <text x="30" y="240" text-anchor="middle" style="fill:rgb(194, 192, 182);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:auto">0</text>
  <text x="20" y="140" text-anchor="middle" transform="rotate(-90 20 140)" style="fill:rgb(194, 192, 182);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:12px;font-weight:400;text-anchor:middle;dominant-baseline:auto">GFLOPS</text>

