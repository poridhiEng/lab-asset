<svg width="100%" viewBox="0 0 680 260" role="img" style="" xmlns="http://www.w3.org/2000/svg">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Times New Roman&quot;, Times, serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">gemmStridedBatched memory layout with normal stride and stride zero broadcast</title>
